{{- if and .Values.tls.patch.enabled (not .Values.tls.certManager.enabled) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kai-resource-isolator.fullname" . }}-admission
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade,post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "kai-resource-isolator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kai-resource-isolator.fullname" . }}-admission
subjects:
  - kind: ServiceAccount
    name: {{ include "kai-resource-isolator.fullname" . }}-admission
    namespace: {{ include "kai-resource-isolator.namespace" . }}
{{- end }}
