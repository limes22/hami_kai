{{- if and .Values.tls.patch.enabled (not .Values.tls.certManager.enabled) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kai-resource-isolator.fullname" . }}-admission-patch
  namespace: {{ include "kai-resource-isolator.namespace" . }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
  labels:
    {{- include "kai-resource-isolator.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        kai-resource-isolator.io/webhook: ignore
        {{- include "kai-resource-isolator.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "kai-resource-isolator.pullSecrets" . | nindent 6 }}
      restartPolicy: OnFailure
      serviceAccountName: {{ include "kai-resource-isolator.fullname" . }}-admission
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.tls.patch.runAsUser }}
      containers:
        - name: patch
          {{- if ge (int (regexReplaceAll "[^0-9]" .Capabilities.KubeVersion.Minor "0")) 22 }}
          image: {{ include "kai-resource-isolator.patch.imageNew" . }}
          imagePullPolicy: {{ .Values.tls.patch.imageNew.pullPolicy }}
          {{- else }}
          image: {{ include "kai-resource-isolator.patch.imageLegacy" . }}
          imagePullPolicy: {{ .Values.tls.patch.image.pullPolicy }}
          {{- end }}
          args:
            - patch
            - --webhook-name={{ include "kai-resource-isolator.webhook.configName" . }}
            - --namespace={{ include "kai-resource-isolator.namespace" . }}
            - --patch-validating=false
            - --secret-name={{ include "kai-resource-isolator.webhook.tlsSecret" . }}
      {{- with .Values.tls.patch.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tls.patch.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
