apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "kai-resource-isolator.webhook.configName" . }}
  {{- if .Values.tls.certManager.enabled }}
  annotations:
    cert-manager.io/inject-ca-from: {{ include "kai-resource-isolator.namespace" . }}/{{ include "kai-resource-isolator.fullname" . }}-serving-cert
  {{- end }}
  labels:
    {{- include "kai-resource-isolator.labels" . | nindent 4 }}
webhooks:
  - name: vgpu.lib.kai-resource-isolator.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "kai-resource-isolator.webhook.fullname" . }}
        namespace: {{ include "kai-resource-isolator.namespace" . }}
        path: /mutate
        port: {{ .Values.service.port }}
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    namespaceSelector:
      matchExpressions:
        - key: kai-resource-isolator.io/webhook
          operator: NotIn
          values:
            - ignore
    objectSelector:
      matchExpressions:
        - key: kai-resource-isolator.io/webhook
          operator: NotIn
          values:
            - ignore
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods
        scope: '*'
    sideEffects: None
    timeoutSeconds: 10
