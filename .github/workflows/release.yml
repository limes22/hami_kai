name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+'

concurrency:
  group: kai-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Compute image tags
        id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          REPO="docker.io/projecthami/kai-resource-isolator"
          echo "tags=${REPO}:${VERSION},${REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_TOKEN }}
          password: ${{ secrets.DOCKERHUB_PASSWD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}

    outputs:
      version: ${{ steps.meta.outputs.version }}

  chart:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package and push chart
        run: |
          VERSION="${{ needs.docker.outputs.version }}"
          CHART_DIR="chart/kai-resource-isolator"

          sed -i "s/^version:.*/version: ${VERSION}/" "${CHART_DIR}/Chart.yaml"
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" "${CHART_DIR}/Chart.yaml"
          sed -i "s/^  tag:.*/  tag: ${VERSION}/" "${CHART_DIR}/values.yaml"

          helm package "${CHART_DIR}" --version "${VERSION}"

          echo "${{ secrets.DOCKERHUB_PASSWD }}" | helm registry login docker.io \
            --username "${{ secrets.DOCKERHUB_TOKEN }}" --password-stdin

          helm push "kai-resource-isolator-${VERSION}.tgz" oci://docker.io/projecthami
